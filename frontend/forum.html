<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Форум — NeverLight</title>
  <link rel="stylesheet" href="/assets/css/style.css">
</head>
<body>

<nav>
  <div class="nav-logo">✦ NeverLight</div>
  <div class="nav-links">
    <a href="/">Главная</a>
    <a href="/forum.html" class="active">Форум</a>
    <a href="/donate.html">Донат</a>
    <a href="/download.html">Скачать</a>
  </div>
  <div class="nav-right" id="nav-right"></div>
</nav>

<div class="forum-wrap" id="main-view">
  <div class="page-title">💬 Форум</div>
  <div id="categories-list">
    <div style="color:var(--text2);text-align:center;padding:40px">Загрузка...</div>
  </div>
</div>

<div class="forum-wrap" id="topics-view" style="display:none">
  <div class="breadcrumb">
    <a href="#" onclick="showCategories()">Форум</a>
    <span>›</span>
    <span id="cat-name-bc"></span>
  </div>
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px">
    <div class="page-title" id="cat-title" style="margin-bottom:0"></div>
    <button class="btn btn-red" onclick="showNewTopic()" id="new-topic-btn">+ Новая тема</button>
  </div>
  <div id="topics-list"></div>
</div>

<div class="forum-wrap" id="topic-view" style="display:none">
  <div class="breadcrumb">
    <a href="#" onclick="showCategories()">Форум</a>
    <span>›</span>
    <a href="#" onclick="showTopics(currentCatId, currentCatName)" id="cat-bc-link"></a>
    <span>›</span>
    <span id="topic-bc"></span>
  </div>
  <div class="page-title" id="topic-title"></div>
  <div id="posts-list"></div>

  <div class="reply-box" id="reply-box">
    <h3>Ответить</h3>
    <textarea id="reply-content" placeholder="Напиши ответ..."></textarea>
    <div class="form-error" id="reply-error" style="margin-top:8px"></div>
    <button class="btn btn-red" style="margin-top:10px" onclick="submitReply()">Отправить</button>
  </div>
  <div id="login-to-reply" style="display:none" class="reply-box">
    <p style="color:var(--text2)">Войдите, чтобы оставить ответ — <a href="#" onclick="openModal('login')" style="color:var(--accent2)">Войти</a></p>
  </div>
</div>

<!-- NEW TOPIC MODAL -->
<div class="modal-overlay" id="new-topic-modal">
  <div class="modal" style="max-width:560px">
    <button class="modal-close" onclick="document.getElementById('new-topic-modal').classList.remove('open')">×</button>
    <h2>Новая тема</h2>
    <div class="form-group">
      <label>Заголовок</label>
      <input type="text" id="new-title" placeholder="Введи заголовок темы">
    </div>
    <div class="form-group">
      <label>Текст</label>
      <textarea id="new-content" style="width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:12px;color:var(--text);font-family:inherit;min-height:160px;font-size:14px;outline:none;resize:vertical" placeholder="Напиши что-нибудь..."></textarea>
    </div>
    <div class="form-error" id="new-topic-error"></div>
    <button class="btn btn-red" style="width:100%;padding:12px" onclick="submitNewTopic()">Создать тему</button>
  </div>
</div>

<!-- AUTH MODAL -->
<div class="modal-overlay" id="auth-modal">
  <div class="modal">
    <button class="modal-close" onclick="closeModal()">×</button>
    <div class="modal-tabs">
      <div class="modal-tab active" data-tab="login" onclick="switchTab('login')">Войти</div>
      <div class="modal-tab" data-tab="register" onclick="switchTab('register')">Регистрация</div>
    </div>
    <div id="form-login">
      <form onsubmit="doLogin(event)">
        <div class="form-group"><label>Никнейм или email</label><input type="text" id="login-username" required></div>
        <div class="form-group"><label>Пароль</label><input type="password" id="login-password" required></div>
        <div class="form-error" id="login-error"></div>
        <button type="submit" class="btn btn-red" style="width:100%;padding:12px">Войти</button>
      </form>
    </div>
    <div id="form-register" style="display:none">
      <form onsubmit="doRegister(event)">
        <div class="form-group"><label>Никнейм</label><input type="text" id="reg-username" minlength="3" required></div>
        <div class="form-group"><label>Email (необязательно)</label><input type="email" id="reg-email"></div>
        <div class="form-group"><label>Пароль</label><input type="password" id="reg-password" minlength="6" required></div>
        <div class="form-error" id="register-error"></div>
        <button type="submit" class="btn btn-red" style="width:100%;padding:12px">Создать аккаунт</button>
      </form>
    </div>
  </div>
</div>

<script src="/assets/js/api.js"></script>
<script>
const BASE = 'http://157.22.207.233/api';
let currentCatId = null;
let currentCatName = '';
let currentTopicId = null;

function showView(id) {
  ['main-view','topics-view','topic-view'].forEach(v => {
    document.getElementById(v).style.display = v === id ? 'block' : 'none';
  });
}

async function showCategories() {
  showView('main-view');
  const res = await fetch(`${BASE}/forum/categories`);
  const cats = await res.json();
  const el = document.getElementById('categories-list');
  if (!cats.length) { el.innerHTML = '<div style="color:var(--text2);text-align:center;padding:40px">Пока нет категорий</div>'; return; }
  el.innerHTML = cats.map(c => `
    <div class="forum-category" onclick="showTopics(${c.id}, '${c.name}')">
      <div class="category-header">
        <div class="category-icon">${c.icon || '💬'}</div>
        <div class="category-info">
          <div class="category-name">${c.name}</div>
          <div class="category-desc">${c.description || ''}</div>
        </div>
        <div class="category-stats">
          <strong>${c.topic_count || 0}</strong>
          <span>тем</span>
          <strong style="margin-top:6px;display:block">${c.post_count || 0}</strong>
          <span>сообщений</span>
        </div>
      </div>
    </div>
  `).join('');
}

async function showTopics(catId, catName) {
  currentCatId = catId;
  currentCatName = catName;
  showView('topics-view');
  document.getElementById('cat-title').textContent = catName;
  document.getElementById('cat-name-bc').textContent = catName;
  if (!Auth.isLoggedIn()) document.getElementById('new-topic-btn').style.display = 'none';
  const res = await fetch(`${BASE}/forum/categories/${catId}/topics`);
  const topics = await res.json();
  const el = document.getElementById('topics-list');
  if (!topics.length) {
    el.innerHTML = '<div style="color:var(--text2);text-align:center;padding:40px">Тем пока нет. Создай первую!</div>';
    return;
  }
  el.innerHTML = `<div class="forum-category">` + topics.map(t => `
    <div class="topic-row" onclick="showTopic(${t.id}, '${t.title.replace(/'/g,"\\'")}')">
      <div>
        ${t.is_pinned ? '<span class="topic-pin">📌</span>' : ''}
        <span class="topic-title">${t.title}</span>
        <div class="topic-meta">${t.username} · ${new Date(t.created_at).toLocaleDateString('ru')}</div>
      </div>
      <div class="topic-replies">${t.reply_count || 0} ответов</div>
    </div>
  `).join('') + `</div>`;
}

async function showTopic(topicId, topicTitle) {
  currentTopicId = topicId;
  showView('topic-view');
  document.getElementById('topic-title').textContent = topicTitle;
  document.getElementById('topic-bc').textContent = topicTitle;
  document.getElementById('cat-bc-link').textContent = currentCatName;
  const res = await fetch(`${BASE}/forum/topics/${topicId}`);
  const data = await res.json();
  const el = document.getElementById('posts-list');
  el.innerHTML = data.posts.map(p => `
    <div class="post-card">
      <div class="post-sidebar">
        <div class="post-avatar">${p.username.slice(0,2).toUpperCase()}</div>
        <div class="post-username">${p.username}</div>
        <div class="post-role">${p.role}</div>
      </div>
      <div class="post-body">
        <div class="post-date">${new Date(p.created_at).toLocaleString('ru')}</div>
        <div class="post-content">${escHtml(p.content)}</div>
      </div>
    </div>
  `).join('');
  if (Auth.isLoggedIn()) {
    document.getElementById('reply-box').style.display = 'block';
    document.getElementById('login-to-reply').style.display = 'none';
  } else {
    document.getElementById('reply-box').style.display = 'none';
    document.getElementById('login-to-reply').style.display = 'block';
  }
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

async function submitReply() {
  const content = document.getElementById('reply-content').value.trim();
  const err = document.getElementById('reply-error');
  if (!content) { err.textContent = 'Напиши что-нибудь'; err.classList.add('show'); return; }
  const res = await fetch(`${BASE}/forum/topics/${currentTopicId}/posts`, {
    method: 'POST',
    headers: Auth.headers(),
    body: JSON.stringify({ content })
  });
  const data = await res.json();
  if (!res.ok) { err.textContent = data.error; err.classList.add('show'); return; }
  document.getElementById('reply-content').value = '';
  err.classList.remove('show');
  showTopic(currentTopicId, document.getElementById('topic-title').textContent);
}

function showNewTopic() {
  if (!Auth.isLoggedIn()) { openModal('login'); return; }
  document.getElementById('new-topic-modal').classList.add('open');
}

async function submitNewTopic() {
  const title = document.getElementById('new-title').value.trim();
  const content = document.getElementById('new-content').value.trim();
  const err = document.getElementById('new-topic-error');
  if (!title || !content) { err.textContent = 'Заполни все поля'; err.classList.add('show'); return; }
  const res = await fetch(`${BASE}/forum/categories/${currentCatId}/topics`, {
    method: 'POST',
    headers: Auth.headers(),
    body: JSON.stringify({ title, content })
  });
  const data = await res.json();
  if (!res.ok) { err.textContent = data.error; err.classList.add('show'); return; }
  document.getElementById('new-topic-modal').classList.remove('open');
  document.getElementById('new-title').value = '';
  document.getElementById('new-content').value = '';
  showTopics(currentCatId, currentCatName);
}

showCategories();
</script>
</body>
</html>
