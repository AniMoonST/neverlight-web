<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Форум — NeverLight</title>
  <link rel="stylesheet" href="/assets/css/style.css">
</head>
<body>

<!-- CATEGORIES VIEW -->
<div class="forum-wrap" id="view-categories" style="display:none">
  <div class="page-title">💬 Форум</div>
  <div id="categories-list"></div>
</div>

<!-- TOPICS VIEW -->
<div class="forum-wrap" id="view-topics" style="display:none">
  <div class="breadcrumb">
    <a href="#" onclick="showCats()">Форум</a>
    <span>›</span>
    <span id="bc-cat"></span>
  </div>
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px">
    <div class="page-title" id="topics-title" style="margin-bottom:0"></div>
    <button class="btn btn-red" id="btn-new-topic" onclick="openNewTopic()">+ Новая тема</button>
  </div>
  <div id="topics-list"></div>
</div>

<!-- TOPIC VIEW -->
<div class="forum-wrap" id="view-topic" style="display:none">
  <div class="breadcrumb">
    <a href="#" onclick="showCats()">Форум</a>
    <span>›</span>
    <a href="#" id="bc-cat2" onclick="backToCat()"></a>
    <span>›</span>
    <span id="bc-topic"></span>
  </div>
  <div style="display:flex;align-items:center;gap:12px;margin-bottom:24px;flex-wrap:wrap">
    <div class="page-title" id="topic-title" style="margin-bottom:0;flex:1"></div>
    <div id="topic-badges"></div>
  </div>
  <div id="posts-list"></div>
  <div id="reply-area"></div>
</div>

<!-- NEW TOPIC MODAL -->
<div class="modal-overlay" id="modal-new-topic">
  <div class="modal" style="max-width:560px">
    <button class="modal-close" onclick="document.getElementById('modal-new-topic').classList.remove('open')">×</button>
    <h2 style="margin-bottom:20px">Новая тема</h2>
    <div class="form-group">
      <label>Заголовок</label>
      <input type="text" id="new-title" placeholder="Введи заголовок темы">
    </div>
    <div class="form-group">
      <label>Текст</label>
      <textarea id="new-content" style="width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:9px;padding:12px;color:var(--text);font-family:inherit;min-height:160px;font-size:14px;outline:none;resize:vertical;transition:border-color 0.2s" onfocus="this.style.borderColor='var(--accent)'" onblur="this.style.borderColor='var(--border)'" placeholder="Напиши что-нибудь..."></textarea>
    </div>
    <div class="form-error" id="new-topic-error"></div>
    <button class="btn btn-red" style="width:100%;padding:12px" onclick="submitNewTopic()">Создать тему</button>
  </div>
</div>

<script src="/assets/js/api.js"></script>
<script src="/assets/js/common.js"></script>
<script src="/assets/js/particles.js"></script>
<script>
const BASE = API;
let currentCatId = null, currentCatName = '', currentTopicId = null;

// Маппинг иконок по названию категории
const CAT_ICONS = {
  'Объявления': '📢',
  'Общение': '💬',
  'Помощь': '❓',
  'Предложения': '💡',
  'Жалобы и апелляции': '⚖️',
  'Тестировщики': '🔬',
  'Руководство': '👑',
};

function show(id) {
  ['view-categories','view-topics','view-topic'].forEach(v =>
    document.getElementById(v).style.display = v === id ? 'block' : 'none'
  );
}

async function showCats() {
  show('view-categories');
  const res = await fetch(`${BASE}/forum/categories`);
  const cats = await res.json();
  const el = document.getElementById('categories-list');
  if (!cats.length) { el.innerHTML = '<div style="color:var(--text2);text-align:center;padding:60px">Пока нет разделов</div>'; return; }
  el.innerHTML = cats.map((c, i) => `
    <div class="forum-category reveal" style="transition-delay:${i*0.06}s" onclick="showTopics(${c.id},'${escHtml(c.name)}')">
      <div class="category-header">
        <div class="category-icon">${CAT_ICONS[c.name] || '📁'}</div>
        <div class="category-info">
          <div class="category-name">${escHtml(c.name)}</div>
          <div class="category-desc">${escHtml(c.description || '')}</div>
        </div>
        <div class="category-stats">
          <strong>${c.topic_count || 0}</strong>
          <span>тем</span>
          <strong style="margin-top:5px;display:block">${c.post_count || 0}</strong>
          <span>сообщений</span>
        </div>
      </div>
    </div>
  `).join('');
  // re-observe reveals
  document.querySelectorAll('.reveal:not(.visible)').forEach(el => {
    setTimeout(() => el.classList.add('visible'), 50);
  });
}

async function showTopics(catId, catName) {
  if (!Auth.isLoggedIn()) { openModal('login'); return; }
  currentCatId = catId; currentCatName = catName;
  show('view-topics');
  document.getElementById('topics-title').textContent = catName;
  document.getElementById('bc-cat').textContent = catName;
  const res = await fetch(`${BASE}/forum/categories/${catId}/topics`);
  const topics = await res.json();
  const el = document.getElementById('topics-list');
  if (!topics.length) {
    el.innerHTML = '<div class="forum-category"><div style="padding:40px;text-align:center;color:var(--text2)">Тем пока нет. Создай первую!</div></div>';
    return;
  }
  const pinned = topics.filter(t => t.is_pinned);
  const regular = topics.filter(t => !t.is_pinned);
  let html = '';
  if (pinned.length) {
    html += '<div style="font-size:12px;color:var(--text2);font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;margin-left:2px">📌 Закреплённые</div>';
    html += '<div class="forum-category" style="margin-bottom:18px">' + pinned.map(t => topicRow(t)).join('') + '</div>';
  }
  if (regular.length) {
    if (pinned.length) html += '<div style="font-size:12px;color:var(--text2);font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;margin-left:2px">Темы</div>';
    html += '<div class="forum-category">' + regular.map(t => topicRow(t)).join('') + '</div>';
  }
  el.innerHTML = html;
}

function topicRow(t) {
  const status = statusTag(t.status);
  const closed = t.is_closed ? '<span class="locked-icon">🔒</span>' : '';
  return `
    <div class="topic-row" onclick="showTopic(${t.id},'${escHtml(t.title).replace(/'/g,"\\'")}')">
      <div class="topic-left">
        <div class="topic-title-row">
          ${status}
          <span class="topic-title">${escHtml(t.title)}</span>
        </div>
        <div class="topic-meta">${escHtml(t.username)} · ${fmtDate(t.created_at)}</div>
      </div>
      <div class="topic-right">
        ${closed}
        <span class="topic-replies">${t.reply_count || 0} отв.</span>
      </div>
    </div>`;
}

async function showTopic(topicId, title) {
  if (!Auth.isLoggedIn()) { openModal('login'); return; }
  currentTopicId = topicId;
  show('view-topic');
  document.getElementById('topic-title').textContent = title;
  document.getElementById('bc-topic').textContent = title;
  document.getElementById('bc-cat2').textContent = currentCatName;

  const res = await fetch(`${BASE}/forum/topics/${topicId}`);
  const data = await res.json();

  // badges
  let badges = '';
  if (data.topic.status) badges += statusTag(data.topic.status) + ' ';
  if (data.topic.is_closed) badges += '<span class="topic-status status-closed">🔒 Закрыто</span>';
  document.getElementById('topic-badges').innerHTML = badges;

  // posts
  document.getElementById('posts-list').innerHTML = data.posts.map(p => `
    <div class="post-card">
      <div class="post-sidebar">
        <div class="post-avatar">${escHtml(p.username).slice(0,2).toUpperCase()}</div>
        <div class="post-username">${escHtml(p.username)}</div>
        <div style="margin-top:5px">${roleTag(p.role)}</div>
        <div style="margin-top:6px;font-size:11px;color:var(--text2)">с ${fmtDateShort(p.user_since)}</div>
      </div>
      <div class="post-body">
        <div class="post-date">${fmtDateFull(p.created_at)}</div>
        <div class="post-content">${escHtml(p.content)}</div>
      </div>
    </div>
  `).join('');

  // reply
  const closed = data.topic.is_closed;
  document.getElementById('reply-area').innerHTML = closed
    ? '<div class="reply-box" style="text-align:center;color:var(--text2)">🔒 Тема закрыта — ответы недоступны</div>'
    : `<div class="reply-box">
        <h3>Ответить</h3>
        <textarea id="reply-content" placeholder="Напиши ответ..."></textarea>
        <div class="form-error" id="reply-error" style="margin-top:8px"></div>
        <button class="btn btn-red" style="margin-top:10px" onclick="submitReply()">Отправить</button>
      </div>`;
}

function backToCat() { showTopics(currentCatId, currentCatName); }

function openNewTopic() {
  if (!Auth.isLoggedIn()) { openModal('login'); return; }
  document.getElementById('modal-new-topic').classList.add('open');
}

async function submitNewTopic() {
  const title = document.getElementById('new-title').value.trim();
  const content = document.getElementById('new-content').value.trim();
  const err = document.getElementById('new-topic-error');
  if (!title || !content) { err.textContent = 'Заполни все поля'; err.classList.add('show'); return; }
  const res = await fetch(`${BASE}/forum/categories/${currentCatId}/topics`, {
    method: 'POST', headers: Auth.headers(), body: JSON.stringify({ title, content })
  });
  const data = await res.json();
  if (!res.ok) { err.textContent = data.error; err.classList.add('show'); return; }
  document.getElementById('modal-new-topic').classList.remove('open');
  document.getElementById('new-title').value = '';
  document.getElementById('new-content').value = '';
  showTopics(currentCatId, currentCatName);
}

async function submitReply() {
  const content = document.getElementById('reply-content').value.trim();
  const err = document.getElementById('reply-error');
  if (!content) { err.textContent = 'Напиши что-нибудь'; err.classList.add('show'); return; }
  const res = await fetch(`${BASE}/forum/topics/${currentTopicId}/posts`, {
    method: 'POST', headers: Auth.headers(), body: JSON.stringify({ content })
  });
  const data = await res.json();
  if (!res.ok) { err.textContent = data.error; err.classList.add('show'); return; }
  document.getElementById('reply-content').value = '';
  err.classList.remove('show');
  showTopic(currentTopicId, document.getElementById('topic-title').textContent);
}

function fmtDate(d) { return new Date(d).toLocaleDateString('ru', { day:'numeric', month:'short', year:'numeric' }); }
function fmtDateShort(d) { return new Date(d).toLocaleDateString('ru', { month:'long', year:'numeric' }); }
function fmtDateFull(d) { return new Date(d).toLocaleString('ru', { day:'numeric', month:'short', year:'numeric', hour:'2-digit', minute:'2-digit' }); }

// Auto-open category from URL param
const urlCat = new URLSearchParams(location.search).get('cat');

document.getElementById('modal-new-topic').addEventListener('click', e => {
  if (e.target.id === 'modal-new-topic') e.target.classList.remove('open');
});

showCats().then(() => {
  if (urlCat) {
    // find category by name and open it
    setTimeout(() => {
      const cats = document.querySelectorAll('#categories-list .forum-category');
      cats.forEach(el => {
        if (el.querySelector('.category-name')?.textContent === urlCat) el.click();
      });
    }, 300);
  }
});
</script>
</body>
</html>
