<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Профиль — NeverLight</title>
  <link rel="stylesheet" href="/assets/css/style.css">
</head>
<body>

<nav>
  <div class="nav-logo">✦ NeverLight</div>
  <div class="nav-links">
    <a href="/">Главная</a>
    <a href="/forum.html">Форум</a>
    <a href="/donate.html">Донат</a>
    <a href="/download.html">Скачать</a>
  </div>
  <div class="nav-right" id="nav-right"></div>
</nav>

<div class="profile-wrap" id="profile-content" style="display:none">

  <div class="profile-header">
    <div class="profile-skin" id="skin-viewer">🧑</div>
    <div class="profile-info">
      <h1 id="profile-username"></h1>
      <div class="profile-badge" id="profile-role"></div>
      <div style="color:var(--text2);font-size:13px" id="profile-joined"></div>

      <div class="rubins-block">
        <div class="rubins-icon">💎</div>
        <div>
          <div class="rubins-amount" id="profile-rubins">0</div>
          <div class="rubins-label">Рубинов</div>
        </div>
      </div>

      <div class="profile-stats-row">
        <div class="profile-stat">
          <strong id="profile-posts">0</strong>
          <span>Сообщений</span>
        </div>
        <div class="profile-stat">
          <strong id="profile-topics">0</strong>
          <span>Тем</span>
        </div>
      </div>
    </div>
  </div>

  <!-- INVENTORY -->
  <div class="card" style="margin-bottom:20px">
    <h3 style="margin-bottom:16px">🎒 Инвентарь</h3>
    <div id="inventory-grid" style="display:grid;grid-template-columns:repeat(5,1fr);gap:8px;max-width:360px">
    </div>
  </div>

  <!-- COSMETICS -->
  <div class="card" id="cosmetics-section" style="display:none">
    <h3 style="margin-bottom:16px">✨ Косметика</h3>
    <div id="cosmetics-list" style="display:flex;flex-wrap:wrap;gap:10px"></div>
  </div>

</div>

<div id="not-found" style="display:none;text-align:center;padding:80px 32px">
  <div style="font-size:48px;margin-bottom:16px">👻</div>
  <div style="font-size:20px;font-weight:700;margin-bottom:8px">Игрок не найден</div>
  <div style="color:var(--text2)">Такого пользователя не существует</div>
</div>

<div id="loading" style="text-align:center;padding:80px;color:var(--text2)">Загрузка...</div>

<!-- AUTH MODAL -->
<div class="modal-overlay" id="auth-modal">
  <div class="modal">
    <button class="modal-close" onclick="closeModal()">×</button>
    <div class="modal-tabs">
      <div class="modal-tab active" data-tab="login" onclick="switchTab('login')">Войти</div>
      <div class="modal-tab" data-tab="register" onclick="switchTab('register')">Регистрация</div>
    </div>
    <div id="form-login">
      <form onsubmit="doLogin(event)">
        <div class="form-group"><label>Никнейм или email</label><input type="text" id="login-username" required></div>
        <div class="form-group"><label>Пароль</label><input type="password" id="login-password" required></div>
        <div class="form-error" id="login-error"></div>
        <button type="submit" class="btn btn-red" style="width:100%;padding:12px">Войти</button>
      </form>
    </div>
    <div id="form-register" style="display:none">
      <form onsubmit="doRegister(event)">
        <div class="form-group"><label>Никнейм</label><input type="text" id="reg-username" minlength="3" required></div>
        <div class="form-group"><label>Email (необязательно)</label><input type="email" id="reg-email"></div>
        <div class="form-group"><label>Пароль</label><input type="password" id="reg-password" minlength="6" required></div>
        <div class="form-error" id="register-error"></div>
        <button type="submit" class="btn btn-red" style="width:100%;padding:12px">Создать аккаунт</button>
      </form>
    </div>
  </div>
</div>

<script src="/assets/js/api.js"></script>
<script>
const BASE = 'http://157.22.207.233/api';

async function loadProfile() {
  const params = new URLSearchParams(location.search);
  const username = params.get('u') || (Auth.user()?.username);
  if (!username) { window.location.href = '/'; return; }

  const res = await fetch(`${BASE}/profile/${username}`);
  document.getElementById('loading').style.display = 'none';

  if (!res.ok) { document.getElementById('not-found').style.display = 'block'; return; }

  const u = await res.json();
  document.title = `${u.username} — NeverLight`;
  document.getElementById('profile-content').style.display = 'block';
  document.getElementById('profile-username').textContent = u.username;
  document.getElementById('profile-role').textContent = u.role;
  document.getElementById('profile-joined').textContent = `На сервере с ${new Date(u.created_at).toLocaleDateString('ru', {year:'numeric',month:'long'})}`;
  document.getElementById('profile-rubins').textContent = u.balance_rubins || 0;
  document.getElementById('profile-posts').textContent = u.posts_count || 0;
  document.getElementById('profile-topics').textContent = u.topics_count || 0;

  // Скин из Crafatar
  const skinEl = document.getElementById('skin-viewer');
  skinEl.innerHTML = `<img src="https://crafatar.com/renders/body/${u.uuid}?scale=3&overlay" style="max-height:120px" onerror="this.parentElement.textContent='🧑'">`;

  // Инвентарь (заглушка 5x5)
  const inv = document.getElementById('inventory-grid');
  for (let i = 0; i < 25; i++) {
    const slot = document.createElement('div');
    slot.style.cssText = 'aspect-ratio:1;background:var(--bg3);border:1px solid var(--border);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:20px';
    slot.textContent = '';
    inv.appendChild(slot);
  }

  // Косметика
  if (u.cosmetics) {
    let cos;
    try { cos = typeof u.cosmetics === 'string' ? JSON.parse(u.cosmetics) : u.cosmetics; } catch { cos = null; }
    if (cos && Object.keys(cos).length) {
      document.getElementById('cosmetics-section').style.display = 'block';
      const list = document.getElementById('cosmetics-list');
      Object.entries(cos).forEach(([k, v]) => {
        list.innerHTML += `<div style="background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:10px 16px;font-size:13px"><span style="color:var(--text2)">${k}:</span> ${v}</div>`;
      });
    }
  }
}

loadProfile();
</script>
</body>
</html>
