<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Профиль — NeverLight</title>
  <link rel="stylesheet" href="/assets/css/style.css">
</head>
<body>

<div id="loading" style="text-align:center;padding:80px;color:var(--text2);position:relative;z-index:1">Загрузка...</div>
<div id="not-found" style="display:none;text-align:center;padding:80px 32px;position:relative;z-index:1">
  <div style="font-size:52px;margin-bottom:16px">👻</div>
  <div style="font-size:20px;font-weight:700;margin-bottom:8px">Игрок не найден</div>
  <div style="color:var(--text2)">Такого пользователя не существует</div>
</div>

<div class="profile-wrap" id="profile-content" style="display:none">

  <div class="profile-header reveal">
    <div class="profile-skin" id="skin-viewer">🧑</div>
    <div class="profile-info" style="flex:1">
      <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:8px">
        <h1 id="profile-username" style="margin-bottom:0"></h1>
        <div id="profile-role-badge"></div>
      </div>
      <div style="color:var(--text2);font-size:13px" id="profile-joined"></div>

      <div class="rubins-block">
        <div style="font-size:24px">💎</div>
        <div>
          <div class="rubins-amount" id="profile-rubins">0</div>
          <div class="rubins-label">Рубинов на балансе</div>
        </div>
      </div>

      <div class="profile-stats-row">
        <div class="profile-stat">
          <strong id="profile-posts">0</strong>
          <span>Сообщений</span>
        </div>
        <div class="profile-stat">
          <strong id="profile-topics">0</strong>
          <span>Тем</span>
        </div>
      </div>
    </div>
  </div>

  <div class="card reveal" style="margin-bottom:16px">
    <h3 style="margin-bottom:16px">🎒 Инвентарь</h3>
    <div class="inv-grid" id="inventory-grid"></div>
    <div style="font-size:12px;color:var(--text2);margin-top:12px">Предметы появятся после игры на сервере</div>
  </div>

  <div class="card reveal" id="cosmetics-section" style="display:none">
    <h3 style="margin-bottom:14px">✨ Косметика</h3>
    <div id="cosmetics-list" style="display:flex;flex-wrap:wrap;gap:8px"></div>
  </div>

</div>

<script src="/assets/js/api.js"></script>
<script src="/assets/js/common.js"></script>
<script src="/assets/js/particles.js"></script>
<script>
async function loadProfile() {
  const username = new URLSearchParams(location.search).get('u') || Auth.user()?.username;
  if (!username) { window.location.href = '/'; return; }

  const res = await fetch(`${API}/profile/${username}`);
  document.getElementById('loading').style.display = 'none';
  if (!res.ok) { document.getElementById('not-found').style.display = 'block'; return; }

  const u = await res.json();
  document.title = `${u.username} — NeverLight`;
  document.getElementById('profile-content').style.display = 'block';
  document.getElementById('profile-username').textContent = u.username;
  document.getElementById('profile-role-badge').innerHTML = roleTag(u.role);
  document.getElementById('profile-joined').textContent = `На сервере с ${new Date(u.created_at).toLocaleDateString('ru', {month:'long',year:'numeric'})}`;
  document.getElementById('profile-rubins').textContent = (u.balance_rubins || 0).toLocaleString('ru');
  document.getElementById('profile-posts').textContent = u.posts_count || 0;
  document.getElementById('profile-topics').textContent = u.topics_count || 0;

  // Скин
  if (u.uuid) {
    document.getElementById('skin-viewer').innerHTML =
      `<img src="https://crafatar.com/renders/body/${u.uuid}?scale=3&overlay" style="max-height:110px;image-rendering:pixelated" onerror="this.parentElement.textContent='🧑'">`;
  }

  // Инвентарь 5x5
  const inv = document.getElementById('inventory-grid');
  for (let i = 0; i < 25; i++) {
    const slot = document.createElement('div');
    slot.className = 'inv-slot';
    inv.appendChild(slot);
  }

  // Косметика
  if (u.cosmetics) {
    let cos;
    try { cos = typeof u.cosmetics === 'string' ? JSON.parse(u.cosmetics) : u.cosmetics; } catch { cos = null; }
    if (cos && Object.keys(cos).length) {
      document.getElementById('cosmetics-section').style.display = 'block';
      document.getElementById('cosmetics-list').innerHTML = Object.entries(cos).map(([k,v]) =>
        `<div style="background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:8px 14px;font-size:13px">
          <span style="color:var(--text2)">${escHtml(k)}:</span> ${escHtml(String(v))}
        </div>`
      ).join('');
    }
  }

  setTimeout(() => document.querySelectorAll('.reveal').forEach(el => el.classList.add('visible')), 100);
}

loadProfile();
</script>
</body>
</html>
